<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aditya</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #e7e9ee;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid #22252f;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 18px;
    margin: 0;
    font-weight: 600;
  }
  #keyRow {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    color: #9aa0ac;
  }
  #keyRow input {
    background: #1a1d26;
    border: 1px solid #2c303c;
    border-radius: 6px;
    color: #e7e9ee;
    padding: 6px 8px;
    font-size: 12px;
    width: 140px;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; line-height: 1.45; font-size: 14.5px; white-space: pre-wrap; }
  .user { align-self: flex-end; background: #3a5bfd; color: white; border-bottom-right-radius: 4px; }
  .assistant { align-self: flex-start; background: #1c1f29; border: 1px solid #262a36; border-bottom-left-radius: 4px; }
  .system { align-self: center; color: #8b909c; font-size: 12.5px; }
  #inputRow {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid #22252f;
  }
  #messageInput {
    flex: 1;
    background: #1a1d26;
    border: 1px solid #2c303c;
    border-radius: 10px;
    color: #e7e9ee;
    padding: 12px 14px;
    font-size: 14.5px;
    outline: none;
  }
  #messageInput:focus { border-color: #3a5bfd; }
  #sendBtn {
    background: #3a5bfd;
    border: none;
    color: white;
    padding: 0 20px;
    border-radius: 10px;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
  }
  #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  .dots::after { content: "..."; animation: dots 1.2s steps(4, end) infinite; }
  @keyframes dots { 0%,20%{content:"";} 40%{content:".";} 60%{content:"..";} 80%,100%{content:"...";} }
</style>
</head>
<body>

<header>
  <h1>Aditya</h1>
  <div id="keyRow">
    <span>API key:</span>
    <input id="apiKey" type="password" placeholder="X-API-Key" />
  </div>
</header>

<div id="chat">
  <div class="msg system">Enter your API key above (if your server requires one), then say hello.</div>
</div>

<div id="inputRow">
  <input id="messageInput" type="text" placeholder="Message Aditya..." autocomplete="off" />
  <button id="sendBtn">Send</button>
</div>

<script>
  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const apiKeyEl = document.getElementById('apiKey');

  const sessionId = 'web-' + Math.random().toString(36).slice(2, 10);
  const savedKey = sessionStorage.getItem('aditya_api_key');
  if (savedKey) apiKeyEl.value = savedKey;

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    const key = apiKeyEl.value.trim();
    sessionStorage.setItem('aditya_api_key', key);

    addMessage('user', text);
    inputEl.value = '';
    sendBtn.disabled = true;

    const loadingEl = addMessage('assistant', '');
    loadingEl.classList.add('dots');

    try {
      const headers = { 'Content-Type': 'application/json' };
      if (key) headers['X-API-Key'] = key;

      const res = await fetch('/chat', {
        method: 'POST',
        headers,
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });

      loadingEl.classList.remove('dots');

      if (!res.ok) {
        const errBody = await res.text();
        loadingEl.textContent = 'Error ' + res.status + ': ' + errBody;
        loadingEl.className = 'msg system';
        return;
      }

      const data = await res.json();
      loadingEl.textContent = data.reply;
    } catch (err) {
      loadingEl.classList.remove('dots');
      loadingEl.textContent = 'Network error: ' + err.message;
      loadingEl.className = 'msg system';
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
